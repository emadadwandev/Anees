name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-backend:
    name: Lint — NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  lint-dsp:
    name: Lint — FastAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsp-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install ruff black
      - run: ruff check app/
      - run: black --check app/

  lint-web:
    name: Lint — Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  lint-flutter:
    name: Lint — Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  test-backend:
    name: Test — NestJS Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  test-dsp:
    name: Test — FastAPI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dsp-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx
      - run: pytest --cov=app --cov-report=xml -v

  test-flutter:
    name: Test — Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-dsp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d postgres redis hivemq dsp-service
          sleep 15
      - name: Run migrations
        working-directory: backend
        run: |
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://anees:anees_dev_secret@localhost:5432/anees
      - name: Run E2E tests
        working-directory: backend
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://anees:anees_dev_secret@localhost:5432/anees
          REDIS_URL: redis://:anees_redis_dev@localhost:6379
      - name: Teardown
        if: always()
        run: docker compose down -v

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-dsp, lint-web, test-backend, test-dsp]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend
        run: docker build ./backend --target production -t anees-backend:pr-${{ github.sha }}
      - name: Build DSP service
        run: docker build ./dsp-service --target production -t anees-dsp:pr-${{ github.sha }}
      - name: Build web
        run: docker build ./web -t anees-web:pr-${{ github.sha }}
