name: Deploy — Staging

on:
  push:
    branches: [main]

env:
  OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to OCI Container Registry
        run: echo "${{ secrets.OCI_REGISTRY_TOKEN }}" | docker login ${{ secrets.OCI_REGISTRY }} -u "${{ secrets.OCI_REGISTRY_USER }}" --password-stdin

      - name: Build and push backend
        run: |
          docker build ./backend --target production -t $OCI_REGISTRY/anees-backend:$IMAGE_TAG
          docker build ./backend --target production -t $OCI_REGISTRY/anees-backend:latest
          docker push $OCI_REGISTRY/anees-backend:$IMAGE_TAG
          docker push $OCI_REGISTRY/anees-backend:latest

      - name: Build and push DSP service
        run: |
          docker build ./dsp-service --target production -t $OCI_REGISTRY/anees-dsp:$IMAGE_TAG
          docker build ./dsp-service --target production -t $OCI_REGISTRY/anees-dsp:latest
          docker push $OCI_REGISTRY/anees-dsp:$IMAGE_TAG
          docker push $OCI_REGISTRY/anees-dsp:latest

      - name: Build and push web dashboard
        run: |
          docker build ./web -t $OCI_REGISTRY/anees-web:$IMAGE_TAG
          docker build ./web -t $OCI_REGISTRY/anees-web:latest
          docker push $OCI_REGISTRY/anees-web:$IMAGE_TAG
          docker push $OCI_REGISTRY/anees-web:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_STAGING_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/anees
            echo "${{ secrets.OCI_REGISTRY_TOKEN }}" | docker login ${{ secrets.OCI_REGISTRY }} -u "${{ secrets.OCI_REGISTRY_USER }}" --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull
            docker compose up -d --no-build
            docker compose exec -T backend npx prisma migrate deploy
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://${{ secrets.STAGING_DOMAIN }}/v1/health || exit 1
          echo "Backend health check passed"

      - name: Notify Slack — Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Staging deploy succeeded — `${{ github.sha }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify Slack — Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Staging deploy FAILED — `${{ github.sha }}` by ${{ github.actor }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
